name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msvc:
    name: Windows MSVC Release ${{ matrix.artifact-arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Win32
            artifact-arch: x86
          - platform: x64
            artifact-arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          nuget restore msvc/udp-sender/packages.config -PackagesDirectory packages -NonInteractive
          nuget restore msvc/udp-receiver/packages.config -PackagesDirectory packages -NonInteractive

      - name: Build Release ${{ matrix.artifact-arch }}
        run: msbuild udpcast.slnx /t:Build /p:Configuration=Release /p:Platform=${{ matrix.platform }} /m

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: udpcast-msvc-${{ matrix.artifact-arch }}
          path: |
            build/msvc/${{ matrix.platform }}/Release/udp-sender.exe
            build/msvc/${{ matrix.platform }}/Release/udp-receiver.exe
          if-no-files-found: error
